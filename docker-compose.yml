version: '3.8'

services:
  pipelines-guardian:
    build: .
    container_name: pipelines-guardian
    ports:
      - "8888:8888"
    environment:
      # Jenkins Configuration
      - JENKINS_URL=${JENKINS_URL}
      - JENKINS_USER=${JENKINS_USER}
      - JENKINS_TOKEN=${JENKINS_TOKEN}
      - JENKINS_API_TOKEN=${JENKINS_TOKEN}
      - JENKINS_MCP_COMMAND=jenkins-mcp
      
      # Azure AI Foundry Configuration
      - AI_PROVIDER=azure_foundry
      - AZURE_FOUNDRY_KEY=${AZURE_FOUNDRY_KEY}
      - AZURE_FOUNDRY_ENDPOINT=${AZURE_FOUNDRY_ENDPOINT}
      - AZURE_FOUNDRY_MODEL=${AZURE_FOUNDRY_MODEL:-gpt-5.2-chat}
      
      # GitHub Configuration
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
